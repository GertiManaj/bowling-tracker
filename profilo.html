<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎳 Strike Zone — Profilo</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/profilo.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- SPLASH -->
<div id="splashScreen" style="position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.5s ease,visibility 0.5s ease">
  <div style="font-size:3rem;animation:splashWobble 0.6s ease-in-out infinite">🎳</div>
  <div style="font-family:'Black Han Sans',sans-serif;font-size:1.5rem;color:var(--neon);margin-top:1rem">STRIKE ZONE</div>
</div>
<style>@keyframes splashWobble{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.1)}}</style>
<script>
(function(){const s=localStorage.getItem('theme')||'dark';if(s==='light')document.body.classList.add('light');})();
window.addEventListener('DOMContentLoaded',function(){
  const sp=document.getElementById('splashScreen');
  setTimeout(()=>{sp.style.opacity='0';sp.style.visibility='hidden';setTimeout(()=>sp.remove(),500);},800);
});
</script>

<!-- HEADER -->
<header>
  <div class="header-glow"></div>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-pin">🎳</div>
      <div class="logo-text">
        <span class="logo-title">STRIKE ZONE</span>
        <span class="logo-sub">Bowling Tracker v1.0</span>
      </div>
    </div>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="sessioni.html">Sessioni</a>
      <a href="statistiche.html">Statistiche</a>
      <a href="giocatori.html" class="active">Giocatori</a>
    </nav>
    <div style="display:flex;gap:0.4rem;align-items:center">
      <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="Cambia tema">☀️</button>
      <button onclick="shareLink()" style="font-family:'Share Tech Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--text-muted);padding:0.45rem 0.9rem;border-radius:4px;cursor:pointer">🔗 Condividi</button>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="main-profilo">

  <!-- HERO PROFILO -->
  <div class="profile-hero" id="profileHero">
    <div style="padding:3rem;text-align:center;color:var(--text-muted);font-family:'Share Tech Mono',monospace">caricamento...</div>
  </div>

  <!-- Bottone salva profilo -->
  <div style="display:flex;justify-content:flex-end;margin-top:-1rem">
    <button id="btnSaveProfilo" onclick="saveProfilo()" style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;background:none;border:1px solid var(--border);color:var(--text-muted);padding:0.35rem 0.7rem;border-radius:4px;cursor:pointer" onmouseover="this.style.borderColor='var(--neon4)';this.style.color='var(--neon4)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-muted)'">📸 Salva profilo</button>
  </div>

  <!-- STATS GRID -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- DUE COLONNE -->
  <div class="profilo-two-col">

    <!-- GRAFICO ANDAMENTO -->
    <div>
      <div class="section-title">
        <span class="accent"></span>
        Andamento nel Tempo
      </div>
      <div class="card" style="padding:1.2rem">
        <div style="position:relative;height:260px">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <!-- COMPAGNI -->
    <div>
      <div class="section-title">
        <span class="accent" style="background:var(--neon2);box-shadow:0 0 8px var(--neon2)"></span>
        Compagni di Squadra
      </div>
      <div class="card" id="teammatesCard">
        <div style="padding:1.5rem;text-align:center;color:var(--text-muted);font-size:0.8rem">caricamento...</div>
      </div>
    </div>

  </div>

  <!-- STORICO SESSIONI -->
  <div>
    <div class="section-title">
      <span class="accent" style="background:var(--neon3);box-shadow:0 0 8px var(--neon3)"></span>
      Storico Sessioni
    </div>
    <div id="historyList"></div>
  </div>

</main>

<footer>STRIKE ZONE &nbsp;·&nbsp; BOWLING TRACKER &nbsp;·&nbsp; 🎳</footer>
<div class="toast" id="toast"></div>

<script src="js/auth.js"></script>
<script src="js/screenshot.js"></script>
<script src="js/profilo.js"></script>
<script>
function toggleTheme(){const l=document.body.classList.contains('light');const t=l?'dark':'light';document.body.classList.toggle('light',!l);localStorage.setItem('theme',t);document.getElementById('themeToggle').textContent=l?'☀️':'🌙';}
function initTheme(){const s=localStorage.getItem('theme')||'dark';if(s==='light'){document.body.classList.add('light');const b=document.getElementById('themeToggle');if(b)b.textContent='🌙';}}
function shareLink(){const url=window.location.href;if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>{const t=document.getElementById('toast');t.textContent='✓ Link copiato!';t.className='toast success show';setTimeout(()=>t.className='toast',3000);});}}
initTheme();
</script>
</body>
</html>
