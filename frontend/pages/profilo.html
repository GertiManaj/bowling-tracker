<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#e8ff00"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Strike Zone"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <title>🎳 Strike Zone — Profilo</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/profilo.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="../assets/js/shared.js"></script>
</head>
<body>

<div id="app-header" data-active="giocatori"></div>
<script src="../assets/js/header.js"></script>

<!-- ══ MAIN ══ -->
<main class="main-profilo">

  <!-- HERO PROFILO -->
  <div class="profile-hero" id="profileHero">
    <div style="padding:3rem;text-align:center;color:var(--text-muted);font-family:'Share Tech Mono',monospace">caricamento...</div>
  </div>

  <!-- Bottone salva profilo -->
  <div style="display:flex;justify-content:flex-end;margin-top:-1rem">
    <button id="btnSaveProfilo" onclick="saveProfilo()" class="btn-screenshot">📸 Salva profilo</button>
  </div>

  <!-- STATS GRID -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- DUE COLONNE -->
  <div class="profilo-two-col">

    <div>
      <div class="section-title">
        <span class="accent"></span>
        Andamento nel Tempo
      </div>
      <div class="card" style="padding:1.2rem">
        <div style="position:relative;height:260px">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">
        <span class="accent" style="background:var(--neon2);box-shadow:0 0 8px var(--neon2)"></span>
        Compagni di Squadra
      </div>
      <div class="card" id="teammatesCard">
        <div style="padding:1.5rem;text-align:center;color:var(--text-muted);font-size:0.8rem">caricamento...</div>
      </div>
    </div>

  </div>

  <!-- STORICO SESSIONI -->
  <div>
    <div class="section-title">
      <span class="accent" style="background:var(--neon3);box-shadow:0 0 8px var(--neon3)"></span>
      Storico Sessioni
    </div>
    <div id="historyList"></div>
  </div>

</main>

<footer>STRIKE ZONE &nbsp;·&nbsp; BOWLING TRACKER &nbsp;·&nbsp; 🎳</footer>

<!-- ══ MODAL LOGIN ══ -->
<div class="modal-overlay" id="loginModalOverlay" onclick="handleLoginOverlayClick(event)">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title" style="color:var(--neon)">🔐 Accedi</div>
      <button class="modal-close" onclick="closeLoginModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.85rem;color:var(--text-muted);font-family:'Share Tech Mono',monospace;letter-spacing:0.05em;margin-bottom:0.5rem">Inserisci la password per modificare i dati</p>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="text" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="off" style="-webkit-text-security:disc"/>
      </div>
      <div id="loginError" style="display:none;color:var(--neon2);font-family:'Share Tech Mono',monospace;font-size:0.75rem;margin-top:0.3rem"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeLoginModal()">Annulla</button>
      <button class="btn-primary" id="btnLoginSubmit" onclick="submitLogin()">Accedi</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../assets/js/auth.js"></script>
<script src="../assets/js/screenshot.js"></script>
<script src="../assets/js/profilo.js"></script>
</body>
</html>
