<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#e8ff00"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Strike Zone"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <title>🎳 Strike Zone — Profilo</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <link rel="stylesheet" href="../assets/css/profilo.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="../assets/js/shared.js"></script>
</head>
<body>

<div id="app-header" data-active="giocatori"></div>
<script src="../assets/js/header.js"></script>

<!-- ══ MAIN ══ -->
<main class="main-profilo">

  <!-- HERO PROFILO -->
  <div class="profile-hero" id="profileHero">
    <div style="padding:3rem;text-align:center;color:var(--text-muted);font-family:'Share Tech Mono',monospace">caricamento...</div>
  </div>

  <!-- Bottone salva profilo -->
  <div style="display:flex;justify-content:flex-end;margin-top:-1rem">
    <button id="btnSaveProfilo" onclick="saveProfilo()" class="btn-screenshot">📸 Salva profilo</button>
  </div>

  <!-- STATS GRID -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- DUE COLONNE -->
  <div class="profilo-two-col">

    <div>
      <div class="section-title">
        <span class="accent"></span>
        Andamento nel Tempo
      </div>
      <div class="card" style="padding:1.2rem">
        <div style="position:relative;height:260px">
          <canvas id="trendChart"></canvas>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">
        <span class="accent" style="background:var(--neon2);box-shadow:0 0 8px var(--neon2)"></span>
        Compagni di Squadra
      </div>
      <div class="card" id="teammatesCard">
        <div style="padding:1.5rem;text-align:center;color:var(--text-muted);font-size:0.8rem">caricamento...</div>
      </div>
    </div>

  </div>

  <!-- STORICO SESSIONI -->
  <div>
    <div class="section-title">
      <span class="accent" style="background:var(--neon3);box-shadow:0 0 8px var(--neon3)"></span>
      Storico Sessioni
    </div>
    <div id="historyList"></div>
  </div>

</main>

<footer>STRIKE ZONE &nbsp;·&nbsp; BOWLING TRACKER &nbsp;·&nbsp; 🎳</footer>

<!-- ══ MODAL LOGIN ══ -->
<div class="modal-overlay" id="loginModalOverlay" onclick="handleLoginOverlayClick(event)">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <div class="modal-title" style="color:var(--neon)">🔐 Accedi</div>
      <button class="modal-close" onclick="closeLoginModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.85rem;color:var(--text-muted);font-family:'Share Tech Mono',monospace;letter-spacing:0.05em;margin-bottom:0.5rem">Inserisci la password per modificare i dati</p>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="text" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="off" style="-webkit-text-security:disc"/>
      </div>
      <div id="loginError" style="display:none;color:var(--neon2);font-family:'Share Tech Mono',monospace;font-size:0.75rem;margin-top:0.3rem"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeLoginModal()">Annulla</button>
      <button class="btn-primary" id="btnLoginSubmit" onclick="submitLogin()">Accedi</button>
    </div>
  </div>
</div>

<!-- ══ MODAL: NUOVA PARTITA ══ -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🎳 Nuova Partita</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr 100px 100px;gap:0.8rem">
        <div class="form-group">
          <label class="form-label">Data</label>
          <input type="date" class="form-input" id="sessionDate"/>
        </div>
        <div class="form-group">
          <label class="form-label">Luogo</label>
          <input type="text" class="form-input" id="sessionLocation" placeholder="es. Bowling Palaghiaccio"/>
        </div>
        <div class="form-group">
          <label class="form-label">N° Game</label>
          <select class="form-input" id="numGames" onchange="buildGameRows()">
            <option value="1">1 game</option>
            <option value="2" selected>2 game</option>
            <option value="3">3 game</option>
            <option value="4">4 game</option>
            <option value="5">5 game</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">€ / game</label>
          <input type="number" class="form-input" id="sessionCost" placeholder="es. 4" min="0" step="0.5"/>
        </div>
      </div>
      <div class="team-section">
        <div class="team-section-header">
          <span class="team-section-title team-a-title">⚡ Squadra A</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text-muted)" id="totalA">Totale: 0</span>
        </div>
        <div class="team-section-body">
          <div class="form-group">
            <label class="form-label">Nome squadra</label>
            <input type="text" class="form-input" id="teamAName" placeholder="es. Fulmini"/>
          </div>
          <div id="teamARows"></div>
          <button class="btn-add-player" onclick="addPlayerRow('A')">+ Aggiungi giocatore</button>
        </div>
      </div>
      <div class="team-section">
        <div class="team-section-header">
          <span class="team-section-title team-b-title">🔥 Squadra B</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text-muted)" id="totalB">Totale: 0</span>
        </div>
        <div class="team-section-body">
          <div class="form-group">
            <label class="form-label">Nome squadra</label>
            <input type="text" class="form-input" id="teamBName" placeholder="es. Fiamme"/>
          </div>
          <div id="teamBRows"></div>
          <button class="btn-add-player" onclick="addPlayerRow('B')">+ Aggiungi giocatore</button>
        </div>
      </div>
      <div class="team-section">
        <div class="team-section-header">
          <span class="team-section-title" style="color:var(--neon3)">👤 Giocatori singoli</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text-muted)">Non partecipano alla sfida</span>
        </div>
        <div class="team-section-body">
          <div id="soloRows"></div>
          <button class="btn-add-player" onclick="addSoloRow()">+ Aggiungi giocatore singolo</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Note (opzionale)</label>
        <input type="text" class="form-input" id="sessionNotes" placeholder="es. Miglior serata dell'anno 🎳"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Annulla</button>
      <button class="btn-primary" id="btnSave" onclick="saveSession()">Salva Partita</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../assets/js/auth.js"></script>
<script src="../assets/js/modal-nuova-partita.js"></script>
<script src="../assets/js/screenshot.js"></script>
<script src="../assets/js/profilo.js"></script>
</body>
</html>
