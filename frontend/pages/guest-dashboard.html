<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎳 Strike Zone — Classifica Ospite</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <script src="../assets/js/shared.js"></script>
  <style>
    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    .gd-hero { text-align: center; padding: 2rem 1rem 1rem; }
    .gd-pin   { font-size: 3rem; display: block; margin-bottom: 0.5rem;
                animation: wobble 2s ease-in-out infinite; }
    .gd-title { font-family: 'Black Han Sans', sans-serif; font-size: 2rem;
                color: var(--neon); letter-spacing: 0.08em; }
    .gd-sub   { font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
                letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); }
    @keyframes wobble { 0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)} }

    .gd-wrap  { max-width: 700px; margin: 0 auto; padding: 0 1rem 3rem; }

    /* ── PODIUM ── */
    .gd-podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 0.8rem; margin: 1.2rem 0 1.8rem;
    }
    .gd-pod {
      flex: 1; max-width: 170px; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem 0.6rem 0.8rem;
    }
    .gd-pod.p1 { border-color: rgba(232,255,0,0.5); max-width: 190px;
                 box-shadow: 0 0 24px rgba(232,255,0,0.12); padding-top: 1.4rem; }
    .gd-pod.p2 { border-color: rgba(180,180,180,0.3); }
    .gd-pod.p3 { border-color: rgba(205,127,50,0.3); }
    .gd-pod-medal { font-size: 1.6rem; display: block; margin-bottom: 0.3rem; }
    .gd-pod-emoji { font-size: 2.2rem; display: block; margin-bottom: 0.4rem; }
    .gd-pod-name  { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.2rem;
                    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .gd-pod-media { font-family: 'Black Han Sans', sans-serif; color: var(--neon); font-size: 1.2rem; }
    .gd-pod-lbl   { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem;
                    letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }

    /* ── TABLE ── */
    .gd-table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem;
    }
    .gd-table-title {
      padding: 0.6rem 1rem;
      font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
    }
    table.gd-tbl { width: 100%; border-collapse: collapse; }
    table.gd-tbl th {
      font-family: 'Share Tech Mono', monospace; font-size: 0.58rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted);
      padding: 0.55rem 0.8rem; text-align: right;
      border-bottom: 1px solid var(--border); background: var(--surface2);
    }
    table.gd-tbl th:nth-child(1) { text-align: center; width: 40px; }
    table.gd-tbl th:nth-child(2) { text-align: left; }
    table.gd-tbl td {
      padding: 0.65rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.04);
      text-align: right; vertical-align: middle; font-size: 0.9rem;
    }
    table.gd-tbl td:nth-child(1) { text-align: center; }
    table.gd-tbl td:nth-child(2) { text-align: left; }
    table.gd-tbl tbody tr:last-child td { border-bottom: none; }
    table.gd-tbl tbody tr:hover td { background: rgba(255,255,255,0.02); }

    .gd-num { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
              color: var(--text-muted); }
    .gd-num.g { color: #f5c542; font-weight: 700; }
    .gd-num.s { color: #b0b8c1; font-weight: 700; }
    .gd-num.b { color: #cd7f32; font-weight: 700; }
    .gd-pname { font-weight: 600; font-size: 0.9rem; }
    .gd-media { font-family: 'Black Han Sans', sans-serif; color: var(--neon); font-size: 0.92rem; }

    /* ── LOADING ── */
    .gd-loading { text-align: center; padding: 2.5rem 1rem;
                  font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
                  color: var(--text-muted); }
    .gd-spinner { width: 32px; height: 32px; border-radius: 50%;
                  border: 3px solid var(--border); border-top-color: var(--neon);
                  animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BACK BUTTON ── */
    .gd-back {
      display: block; text-align: center; margin: 0 auto 1rem;
      max-width: 300px;
      background: none; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.8rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
      font-size: 0.95rem; letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; transition: all 0.2s;
    }
    .gd-back:hover { border-color: var(--neon); color: var(--neon); }

    .gd-guest-badge {
      text-align: center;
      font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 1rem;
    }
    .gd-guest-badge span {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.25rem 0.8rem;
    }
  </style>
</head>
<body>

<div class="gd-hero">
  <span class="gd-pin">🎳</span>
  <div class="gd-title">STRIKE ZONE</div>
  <div class="gd-sub">Classifica Pubblica</div>
</div>

<div class="gd-wrap">

  <div class="gd-guest-badge"><span>👤 Modalità Ospite</span></div>

  <div id="gdPodium"></div>

  <div class="gd-table-wrap">
    <div class="gd-table-title">
      <span style="color:var(--neon)">▌</span> Classifica — Media punti
    </div>
    <div id="gdTable">
      <div class="gd-loading">
        <div class="gd-spinner"></div>
        Caricamento classifica...
      </div>
    </div>
  </div>

  <a href="welcome.html" class="gd-back">← Torna alla Home</a>

</div>

<script>
async function loadLeaderboard() {
  try {
    const players = await fetch('/api/leaderboard.php').then(r => r.json());
    if (!Array.isArray(players)) throw new Error();

    const sorted = [...players]
      .sort((a, b) => (parseFloat(b.media) || 0) - (parseFloat(a.media) || 0));

    renderPodium(sorted.slice(0, 3));
    renderTable(sorted.slice(0, 10));
  } catch(e) {
    document.getElementById('gdTable').innerHTML =
      '<div class="gd-loading" style="color:var(--neon2)">Errore caricamento</div>';
  }
}

function renderPodium(top) {
  if (top.length < 3) { document.getElementById('gdPodium').innerHTML = ''; return; }
  const order = [top[1], top[0], top[2]];
  const cls   = ['p2', 'p1', 'p3'];
  const medal = ['🥈', '🥇', '🥉'];

  document.getElementById('gdPodium').innerHTML =
    '<div class="gd-podium">' +
    order.map((p, i) => `
      <div class="gd-pod ${cls[i]}">
        <span class="gd-pod-medal">${medal[i]}</span>
        <span class="gd-pod-emoji">${p.emoji || '🎳'}</span>
        <div class="gd-pod-name">${esc(p.name)}</div>
        <div class="gd-pod-media">${p.media || '—'}</div>
        <div class="gd-pod-lbl">Media</div>
      </div>`).join('') +
    '</div>';
}

function renderTable(top10) {
  if (!top10.length) {
    document.getElementById('gdTable').innerHTML =
      '<div class="gd-loading">Nessun giocatore trovato</div>';
    return;
  }

  const numCls = i => i === 0 ? 'g' : i === 1 ? 's' : i === 2 ? 'b' : '';
  const numTxt = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);

  const rows = top10.map((p, i) => `
    <tr>
      <td><span class="gd-num ${numCls(i)}">${numTxt(i)}</span></td>
      <td><span style="margin-right:0.4rem">${p.emoji || '🎳'}</span><span class="gd-pname">${esc(p.name)}</span></td>
      <td class="gd-media">${p.media || '—'}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--neon2)">${p.record || '—'}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:0.78rem;color:var(--text-muted)">${parseInt(p.partite) || 0}</td>
    </tr>`).join('');

  document.getElementById('gdTable').innerHTML = `
    <table class="gd-tbl">
      <thead><tr>
        <th>#</th><th>Giocatore</th><th>Media</th><th>Record</th><th>Serate</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadLeaderboard();
</script>

</body>
</html>
