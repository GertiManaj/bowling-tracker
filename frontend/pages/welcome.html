<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#e8ff00"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Strike Zone"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <title>🎳 Strike Zone — Classifica</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <script src="../assets/js/shared.js"></script>
  <style>
    /* ── LAYOUT ── */
    body { background: var(--bg); color: var(--text); min-height: 100vh; }
    .wc-wrap { max-width: 780px; margin: 0 auto; padding: 0 1rem 3rem; }

    /* ── HERO ── */
    .wc-hero {
      text-align: center; padding: 2.5rem 1rem 1.8rem;
    }
    .wc-pin   { font-size: 3.5rem; display: block; margin-bottom: 0.7rem;
                animation: wobble 2s ease-in-out infinite; }
    .wc-title { font-family: 'Black Han Sans', sans-serif; font-size: 2.4rem;
                color: var(--neon); text-shadow: 0 0 30px rgba(232,255,0,0.5);
                letter-spacing: 0.08em; margin-bottom: 0.2rem; }
    .wc-sub   { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
                letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); }
    @keyframes wobble { 0%,100%{transform:rotate(-6deg) scale(1)} 50%{transform:rotate(6deg) scale(1.08)} }

    /* ── PODIUM ── */
    .wc-podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 0.8rem; margin: 1.5rem 0 2rem;
    }
    .wc-pod {
      flex: 1; max-width: 180px; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.2rem 0.8rem 1rem;
      transition: transform 0.2s;
    }
    .wc-pod:hover { transform: translateY(-4px); }
    .wc-pod.p1 {
      border-color: rgba(232,255,0,0.5); max-width: 200px;
      box-shadow: 0 0 30px rgba(232,255,0,0.15);
      padding-top: 1.6rem; padding-bottom: 1.2rem;
    }
    .wc-pod.p2 { border-color: rgba(180,180,180,0.4); }
    .wc-pod.p3 { border-color: rgba(205,127,50,0.4); }
    .wc-pod-medal { font-size: 1.8rem; display: block; margin-bottom: 0.4rem; }
    .wc-pod-emoji { font-size: 2.4rem; display: block; margin-bottom: 0.5rem; }
    .wc-pod.p1 .wc-pod-emoji { font-size: 2.8rem; }
    .wc-pod-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
                   font-size: 1rem; letter-spacing: 0.05em; margin-bottom: 0.3rem;
                   white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .wc-pod-media { font-family: 'Black Han Sans', sans-serif; color: var(--neon);
                    font-size: 1.3rem; }
    .wc-pod.p1 .wc-pod-media { font-size: 1.5rem; }
    .wc-pod-lbl { font-family: 'Share Tech Mono', monospace; font-size: 0.58rem;
                  letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }

    /* ── TABELLA TOP 10 ── */
    .wc-table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; margin-bottom: 2rem;
    }
    .wc-table-title {
      padding: 0.7rem 1rem;
      font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.5rem;
    }
    table.wc-tbl { width: 100%; border-collapse: collapse; }
    table.wc-tbl th {
      font-family: 'Share Tech Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted);
      padding: 0.6rem 0.8rem; text-align: right; border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    table.wc-tbl th:nth-child(1) { text-align: center; width: 44px; }
    table.wc-tbl th:nth-child(2) { text-align: left; }
    table.wc-tbl td {
      padding: 0.7rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.04);
      text-align: right; vertical-align: middle;
    }
    table.wc-tbl td:nth-child(1) { text-align: center; }
    table.wc-tbl td:nth-child(2) { text-align: left; }
    table.wc-tbl tbody tr:last-child td { border-bottom: none; }
    table.wc-tbl tbody tr:hover td { background: rgba(255,255,255,0.025); }

    .wc-num { font-family: 'Share Tech Mono', monospace; font-size: 0.78rem;
              color: var(--text-muted); min-width: 32px; }
    .wc-num.g { color: #f5c542; font-weight: 700; }
    .wc-num.s { color: #b0b8c1; font-weight: 700; }
    .wc-num.b { color: #cd7f32; font-weight: 700; }
    .wc-pname { font-weight: 600; font-size: 0.92rem; }
    .wc-pemoji { margin-right: 0.4rem; }
    .wc-media  { font-family: 'Black Han Sans', sans-serif; color: var(--neon); font-size: 0.95rem; }
    .wc-record { color: var(--neon2); font-family: 'Share Tech Mono', monospace; font-size: 0.82rem; }
    .wc-serate { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; color: var(--text-muted); }

    /* ── LOADING ── */
    .wc-loading {
      text-align: center; padding: 3rem 1rem;
      font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;
      color: var(--text-muted); letter-spacing: 0.1em;
    }
    .wc-spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--neon);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BOTTONI ── */
    .wc-btns {
      display: flex; flex-direction: row; gap: 0.8rem;
      max-width: 560px; margin: 0 auto 2rem; flex-wrap: wrap;
    }
    .wc-btns > button { flex: 1; min-width: 160px; }
    .wc-btn-admin {
      background: var(--neon); color: #0a0a0f;
      border: none; border-radius: 8px; padding: 1rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 1rem; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 0 20px rgba(232,255,0,0.3);
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .wc-btn-admin:hover { box-shadow: 0 0 40px rgba(232,255,0,0.5); transform: translateY(-2px); }
    .wc-btn-guest {
      background: none; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
      font-size: 1rem; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .wc-btn-guest:hover { border-color: var(--text-muted); color: var(--text); transform: translateY(-2px); }
    .wc-btn-continue {
      background: none; color: var(--neon);
      border: 1px solid rgba(232,255,0,0.35); border-radius: 8px;
      padding: 1rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
      font-size: 1rem; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .wc-btn-continue:hover { background: rgba(232,255,0,0.08); transform: translateY(-2px); }
    .wc-btn-player {
      background: none; color: var(--neon2);
      border: 1px solid rgba(0,229,255,0.4); border-radius: 8px;
      padding: 1rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
      font-size: 1rem; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .wc-btn-player:hover { border-color: var(--neon2); background: rgba(0,229,255,0.06); transform: translateY(-2px); }

    /* ── MODAL LOGIN GIOCATORE ── */
    .pl-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 99999; align-items: center; justify-content: center;
    }
    .pl-overlay.open { display: flex; }
    .pl-modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 2rem; width: 100%; max-width: 360px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    .pl-title {
      font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem;
      color: var(--neon2); letter-spacing: 0.06em; margin-bottom: 1.2rem; text-align: center;
    }
    .pl-field { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 1rem; }
    .pl-field label {
      font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted);
    }
    .pl-field input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      padding: 0.65rem 0.85rem; color: var(--text); font-size: 0.95rem;
      outline: none; transition: border-color 0.2s;
    }
    .pl-field input:focus { border-color: var(--neon2); }
    .pl-error {
      display: none; background: rgba(255,60,172,0.1); border: 1px solid rgba(255,60,172,0.3);
      border-radius: 6px; padding: 0.6rem 0.8rem; color: var(--neon2);
      font-family: 'Share Tech Mono', monospace; font-size: 0.72rem;
      margin-bottom: 1rem; text-align: center;
    }
    .pl-btn {
      width: 100%; background: var(--neon2); color: #0a0a0f;
      border: none; border-radius: 8px; padding: 0.85rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      font-size: 1rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: opacity 0.2s; margin-bottom: 0.7rem;
    }
    .pl-btn:hover { opacity: 0.85; }
    .pl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pl-cancel {
      width: 100%; background: none; border: none; color: var(--text-muted);
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem;
      letter-spacing: 0.08em; cursor: pointer; padding: 0.4rem; transition: color 0.2s;
    }
    .pl-cancel:hover { color: var(--text); }

    /* ── REGISTRAZIONE ── */
    .wc-reg-row {
      display: flex; gap: 0.6rem; max-width: 560px; margin: 0 auto 1.5rem;
      padding: 0 1rem; flex-wrap: wrap;
    }
    .wc-reg-row > a { flex: 1; min-width: 140px; }
    .wc-btn-reg {
      background: none; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
      font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .wc-btn-reg:hover { border-color: var(--neon); color: var(--neon); transform: translateY(-2px); }
    .wc-reg-label {
      text-align: center; font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 0.5rem; padding: 0 1rem;
    }
  </style>
</head>
<body>

<div class="wc-hero">
  <span class="wc-pin">🎳</span>
  <div class="wc-title">STRIKE ZONE</div>
  <div class="wc-sub">Bowling Tracker</div>
</div>

<!-- LOGIN BUTTONS (top, before wrap) -->
<div class="wc-btns" id="wcBtns" style="padding: 0 1rem;">
  <button class="wc-btn-admin" onclick="goAdmin()">🔐 Accesso Amministratore</button>
  <button class="wc-btn-guest" onclick="goGuest()">👤 Entra come ospite</button>
</div>

<!-- REGISTRAZIONE -->
<div class="wc-reg-label">Nuovo? Unisciti a Strike Zone</div>
<div class="wc-reg-row">
  <a href="group-register.html" class="wc-btn-reg">🏆 Crea Gruppo</a>
  <a href="player-register.html" class="wc-btn-reg">✍️ Registrati Giocatore</a>
</div>

<div class="wc-wrap">

  <!-- PODIUM TOP 3 -->
  <div id="wcPodium"></div>

  <!-- TOP 10 TABLE -->
  <div class="wc-table-wrap">
    <div class="wc-table-title">
      <span style="color:var(--neon)">▌</span> Top 10 Classifica
    </div>
    <div id="wcTable">
      <div class="wc-loading">
        <div class="wc-spinner"></div>
        Caricamento classifica...
      </div>
    </div>
  </div>

</div>

<!-- MODAL LOGIN GIOCATORE -->
<div class="pl-overlay" id="plOverlay" onclick="handlePlOverlayClick(event)">
  <div class="pl-modal">
    <div class="pl-title">🎳 Accesso Giocatore</div>
    <div class="pl-field">
      <label>Email</label>
      <input type="email" id="plEmail" placeholder="tua@email.com" autocomplete="username"/>
    </div>
    <div class="pl-field">
      <label>Password</label>
      <input type="password" id="plPassword" placeholder="Password" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') submitPlayerLogin()"/>
    </div>
    <div class="pl-error" id="plError"></div>
    <button class="pl-btn" id="plSubmitBtn" onclick="submitPlayerLogin()">🎳 Accedi</button>
    <button class="pl-cancel" onclick="closePlModal()">Annulla</button>
    <div style="text-align:center;margin-top:0.6rem">
      <a href="reset-password-request.html" style="color:var(--text-muted);font-family:'Share Tech Mono',monospace;font-size:0.63rem;letter-spacing:0.1em;text-decoration:underline">Password dimenticata?</a>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = 'sz_auth_token';

// ══════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════

async function loadLeaderboard() {
  try {
    const players = await fetch('/api/leaderboard.php').then(r => r.json());
    if (!Array.isArray(players)) throw new Error();

    // Ordinati per media desc (già ordinati dall'API, ma per sicurezza)
    const sorted = [...players].sort((a, b) =>
      (parseFloat(b.media) || 0) - (parseFloat(a.media) || 0)
    );

    renderPodium(sorted.slice(0, 3));
    renderTable(sorted.slice(0, 10));
  } catch(e) {
    document.getElementById('wcTable').innerHTML =
      '<div class="wc-loading" style="color:var(--neon2)">Errore caricamento classifica</div>';
  }
}

// ── PODIUM TOP 3 ─────────────────────────
function renderPodium(top) {
  if (top.length < 3) { document.getElementById('wcPodium').innerHTML = ''; return; }

  // Ordine visivo: 2° | 1° | 3°
  const order = [top[1], top[0], top[2]];
  const cls   = ['p2', 'p1', 'p3'];
  const medal = ['🥈', '🥇', '🥉'];

  const html = '<div class="wc-podium">' +
    order.map((p, i) => `
      <div class="wc-pod ${cls[i]}">
        <span class="wc-pod-medal">${medal[i]}</span>
        <span class="wc-pod-emoji">${p.emoji || '🎳'}</span>
        <div class="wc-pod-name">${esc(p.name)}</div>
        <div class="wc-pod-media">${p.media || '—'}</div>
        <div class="wc-pod-lbl">Media</div>
      </div>
    `).join('') +
  '</div>';

  document.getElementById('wcPodium').innerHTML = html;
}

// ── TABELLA TOP 10 ───────────────────────
function renderTable(top10) {
  if (!top10.length) {
    document.getElementById('wcTable').innerHTML =
      '<div class="wc-loading">Nessun giocatore trovato</div>';
    return;
  }

  const numCls = i => i === 0 ? 'g' : i === 1 ? 's' : i === 2 ? 'b' : '';
  const numTxt = i => i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);

  let rows = top10.map((p, i) => `
    <tr>
      <td><span class="wc-num ${numCls(i)}">${numTxt(i)}</span></td>
      <td><span class="wc-pemoji">${p.emoji || '🎳'}</span><span class="wc-pname">${esc(p.name)}</span></td>
      <td class="wc-media">${p.media || '—'}</td>
      <td class="wc-record">${p.record || '—'}</td>
      <td class="wc-serate">${parseInt(p.partite) || 0}</td>
    </tr>
  `).join('');

  document.getElementById('wcTable').innerHTML = `
    <table class="wc-tbl">
      <thead><tr>
        <th>#</th>
        <th>Giocatore</th>
        <th>Media</th>
        <th>Record</th>
        <th>Serate</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ══════════════════════════════════════════
// BOTTONI
// ══════════════════════════════════════════

function buildButtons() {
  const container = document.getElementById('wcBtns');
  const token = localStorage.getItem(TOKEN_KEY);
  let extra = '';

  if (token) {
    try {
      const pl = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      if (pl.exp > Math.floor(Date.now() / 1000)) {
        const label = pl.user_type === 'player'
          ? '⚡ Continua come ' + (pl.name || 'Giocatore')
          : '⚡ Continua sessione';
        const dest = pl.user_type === 'player' ? 'index.html' : 'index.html';
        extra = '<button class="wc-btn-continue" onclick="window.location.href=\'' + dest + '\'">' + label + '</button>';
      }
    } catch(e) {}
  }

  container.innerHTML =
    extra +
    '<button class="wc-btn-admin" onclick="goAdmin()">🔐 Accesso Amministratore</button>' +
    '<button class="wc-btn-player" onclick="openPlModal()">🎳 Accesso Giocatore</button>' +
    '<button class="wc-btn-guest" onclick="goGuest()">👤 Entra come ospite</button>';
}

function goAdmin() { window.location.href = 'index.html?login=1'; }
function goGuest()  { localStorage.removeItem(TOKEN_KEY); window.location.href = 'index.html?guest=1'; }

// ── PLAYER LOGIN MODAL ───────────────────────
function openPlModal() {
  document.getElementById('plEmail').value = '';
  document.getElementById('plPassword').value = '';
  document.getElementById('plError').style.display = 'none';
  document.getElementById('plOverlay').classList.add('open');
  setTimeout(() => document.getElementById('plEmail').focus(), 100);
}

function closePlModal() {
  document.getElementById('plOverlay').classList.remove('open');
}

function handlePlOverlayClick(e) {
  if (e.target === document.getElementById('plOverlay')) closePlModal();
}

async function submitPlayerLogin() {
  const email    = document.getElementById('plEmail').value.trim();
  const password = document.getElementById('plPassword').value;
  const btn      = document.getElementById('plSubmitBtn');
  const errEl    = document.getElementById('plError');

  if (!email || !password) {
    errEl.textContent = 'Inserisci email e password';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Accesso...';
  errEl.style.display = 'none';

  try {
    const res  = await fetch('/api/player-auth.php?action=login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.success && data.token) {
      localStorage.setItem(TOKEN_KEY, data.token);
      window.location.href = 'index.html';
    } else {
      errEl.textContent = data.error || 'Credenziali non valide';
      errEl.style.display = 'block';
    }
  } catch(e) {
    errEl.textContent = 'Errore di connessione';
    errEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = '🎳 Accedi';
}

// ══════════════════════════════════════════
// UTILITY
// ══════════════════════════════════════════

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

loadLeaderboard();
buildButtons();
</script>
</body>
</html>
