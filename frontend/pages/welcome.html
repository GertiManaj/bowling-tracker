<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#7c3aed"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Strike Zone"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <title>🎳 Strike Zone — Benvenuto</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <!-- shared.js: tema + SW (senza splash, non serve sulla welcome) -->
  <script src="../assets/js/shared.js"></script>
  <script src="../assets/js/auth-fetch.js"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: 20%; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(232,255,0,0.06) 0%, transparent 70%);
      animation: pulseGlow 3s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50%       { opacity: 1;   transform: translateX(-50%) scale(1.1); }
    }

    .welcome-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 420px;
      max-width: 95vw;
      text-align: center;
      box-shadow: 0 0 80px rgba(0,0,0,0.5);
      animation: fadeInUp 0.6s ease both;
    }

    .welcome-pin   { font-size: 4rem; display: block; margin-bottom: 1rem; animation: wobble 2s ease-in-out infinite; }
    .welcome-title { font-family: 'Black Han Sans', sans-serif; font-size: 2.2rem; color: var(--neon); text-shadow: 0 0 30px rgba(232,255,0,0.5); letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .welcome-sub   { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 2.5rem; }

    .welcome-divider { height: 1px; background: var(--border); margin: 2rem 0; }
    .welcome-label   { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1.2rem; }

    .choice-buttons { display: flex; flex-direction: column; gap: 0.8rem; }

    .btn-admin {
      background: var(--neon); color: #0a0a0f;
      border: none; border-radius: 8px;
      padding: 1rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 0 20px rgba(232,255,0,0.3);
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    }
    .btn-admin:hover { box-shadow: 0 0 40px rgba(232,255,0,0.5); transform: translateY(-2px); }

    .btn-guest {
      background: none; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem 1.5rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600; font-size: 1rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    }
    .btn-guest:hover { border-color: var(--text-muted); color: var(--text); transform: translateY(-2px); }

    .admin-form           { display: none; flex-direction: column; gap: 0.8rem; margin-top: 0.5rem; }
    .admin-form.visible   { display: flex; }

    .error-msg {
      display: none;
      color: var(--neon2);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.05em; text-align: left;
      margin-top: -0.4rem;
    }

    .btn-back {
      background: none; border: none;
      color: var(--text-muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.1em;
      cursor: pointer; text-decoration: underline; margin-top: 0.3rem;
    }
    .btn-back:hover { color: var(--text); }

    .welcome-stats { margin-top: 2rem; display: grid; grid-template-columns: repeat(3,1fr); gap: 0.5rem; }
    .welcome-stat  { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 0.4rem; }
    .welcome-stat-val { font-family: 'Black Han Sans', sans-serif; font-size: 1.2rem; color: var(--neon); }
    .welcome-stat-lbl { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 0.2rem; }

    /* OTP Inputs */
    .otp-inputs-container {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin: 1.5rem 0;
    }
    
    .otp-input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'Barlow Condensed', sans-serif;
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--neon);
      transition: all 0.2s;
    }
    
    .otp-input:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 12px rgba(232,255,0,0.3);
    }
    
    .otp-info {
      margin: 1rem 0;
      padding: 0.8rem;
      background: rgba(232,255,0,0.05);
      border: 1px solid rgba(232,255,0,0.15);
      border-radius: 6px;
    }
    
    .otp-info-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    
    .otp-info-email {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.95rem;
      color: var(--neon);
      font-weight: 600;
    }
    
    .otp-timer-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 1rem 0;
    }
    
    .otp-timer-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    
    .otp-timer {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.1rem;
      color: var(--neon);
    }
    
    .otp-resend-section {
      margin-top: 1rem;
    }
    
    .otp-resend-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-decoration: underline;
      display: none;
    }
    
    .otp-resend-btn:hover {
      color: var(--neon);
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="welcome-card">

  <span class="welcome-pin">🎳</span>
  <div class="welcome-title">STRIKE ZONE</div>
  <div class="welcome-sub">Bowling Tracker v1.0</div>

  <div class="welcome-stats" id="welcomeStats">
    <div class="welcome-stat">
      <div class="welcome-stat-val" id="ws-sessioni">—</div>
      <div class="welcome-stat-lbl">Serate</div>
    </div>
    <div class="welcome-stat">
      <div class="welcome-stat-val" id="ws-record">—</div>
      <div class="welcome-stat-lbl">Record</div>
    </div>
    <div class="welcome-stat">
      <div class="welcome-stat-val" id="ws-media">—</div>
      <div class="welcome-stat-lbl">Media</div>
    </div>
  </div>

  <div class="welcome-divider"></div>

  <div class="welcome-label">Come vuoi accedere?</div>

  <!-- SCELTA INIZIALE -->
  <div class="choice-buttons" id="choiceButtons">
    <button class="btn-admin" onclick="showAdminForm()">🔐 Amministratore</button>
    <button class="btn-guest" onclick="enterAsGuest()">👤 Entra come ospite</button>
  </div>

  <!-- STEP 1: Email + Password -->
  <div class="admin-form" id="adminFormStep1">
    <div class="form-group">
      <input 
        type="email" 
        class="form-input" 
        id="adminEmail" 
        placeholder="Email amministratore"
        autocomplete="email"
      />
    </div>
    <div class="form-group">
      <input 
        type="password" 
        class="form-input" 
        id="adminPassword" 
        placeholder="Password"
        autocomplete="current-password"
      />
    </div>
    <div class="error-msg" id="step1Error"></div>
    <button class="btn-admin" id="btnStep1" onclick="submitAdminStep1()">Continua</button>
    <div style="text-align: center; margin: 0.8rem 0;">
      <a href="reset-password-request.html" style="color: var(--text-muted); text-decoration: none; font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; letter-spacing: 0.1em;">
        Password dimenticata?
      </a>
    </div>
    <button class="btn-back" onclick="showChoiceButtons()">← Torna indietro</button>
  </div>

  <!-- STEP 2: OTP -->
  <div class="admin-form" id="adminFormStep2">
    <div class="otp-info">
      <div class="otp-info-text">Codice inviato a:</div>
      <div class="otp-info-email" id="otpEmailDisplay"></div>
    </div>
    
    <div class="otp-inputs-container">
      <input type="text" id="otp1" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      <input type="text" id="otp2" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      <input type="text" id="otp3" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      <input type="text" id="otp4" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      <input type="text" id="otp5" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
      <input type="text" id="otp6" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" />
    </div>
    
    <div class="otp-timer-section">
      <div class="otp-timer-label">Scade tra</div>
      <div id="otpTimer" class="otp-timer">--:--</div>
    </div>
    
    <div class="error-msg" id="step2Error"></div>
    
    <button class="btn-admin" id="btnStep2" onclick="submitAdminStep2()">Verifica</button>
    
    <div class="otp-resend-section">
      <button id="btnResendOTP" class="otp-resend-btn" onclick="resendOTP()">
        Rinvia codice
      </button>
    </div>
    
    <button class="btn-back" onclick="goBackToStep1()">← Torna indietro</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const AUTH_API  = '/api/auth.php';
const TOKEN_KEY = 'sz_auth_token';

let adminEmail = null; // Salva email per step 2

// ══════════════════════════════════════════
// STATS
// ══════════════════════════════════════════

async function loadWelcomeStats() {
  try {
    const data = await fetch('/api/stats.php').then(r => r.json());
    document.getElementById('ws-sessioni').textContent = data.totale_sessioni || '0';
    document.getElementById('ws-record').textContent   = data.record_assoluto || '—';
    document.getElementById('ws-media').textContent    = data.media_gruppo    || '—';
  } catch(e) {}
}

// ══════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════

function showAdminForm() {
  document.getElementById('choiceButtons').style.display = 'none';
  document.getElementById('adminFormStep1').classList.add('visible');
  setTimeout(() => document.getElementById('adminEmail').focus(), 100);
}

function showChoiceButtons() {
  document.getElementById('adminFormStep1').classList.remove('visible');
  document.getElementById('adminFormStep2').classList.remove('visible');
  document.getElementById('choiceButtons').style.display = 'flex';
  
  // Reset
  document.getElementById('adminEmail').value = '';
  document.getElementById('adminPassword').value = '';
  document.getElementById('step1Error').style.display = 'none';
  document.getElementById('step2Error').style.display = 'none';
  adminEmail = null;
}

function goBackToStep1() {
  document.getElementById('adminFormStep2').classList.remove('visible');
  document.getElementById('adminFormStep1').classList.add('visible');
  
  // Reset OTP
  for (let i = 1; i <= 6; i++) {
    document.getElementById(`otp${i}`).value = '';
  }
  document.getElementById('step2Error').style.display = 'none';
}

function enterAsGuest() {
  localStorage.removeItem(TOKEN_KEY);
  window.location.href = 'index.html';
}

// ══════════════════════════════════════════
// STEP 1: Email + Password → Richiedi OTP
// ══════════════════════════════════════════

async function submitAdminStep1() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  const btn = document.getElementById('btnStep1');
  const errEl = document.getElementById('step1Error');

  if (!email || !password) {
    errEl.textContent = 'Inserisci email e password';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Verifica...';
  errEl.style.display = 'none';

  try {
    const res = await fetch(`${AUTH_API}?action=request-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      adminEmail = email;
      
      // Mostra step 2
      document.getElementById('adminFormStep1').classList.remove('visible');
      document.getElementById('adminFormStep2').classList.add('visible');
      document.getElementById('otpEmailDisplay').textContent = email;
      
      startOTPTimer(data.expires_at);
      setTimeout(() => document.getElementById('otp1').focus(), 100);
      
    } else {
      errEl.textContent = data.error || 'Credenziali non valide';
      errEl.style.display = 'block';
    }

  } catch(e) {
    errEl.textContent = 'Errore di connessione';
    errEl.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Continua';
}

// ══════════════════════════════════════════
// STEP 2: Verifica OTP → Login
// ══════════════════════════════════════════

async function submitAdminStep2() {
  const code = 
    document.getElementById('otp1').value +
    document.getElementById('otp2').value +
    document.getElementById('otp3').value +
    document.getElementById('otp4').value +
    document.getElementById('otp5').value +
    document.getElementById('otp6').value;
  
  const btn = document.getElementById('btnStep2');
  const errEl = document.getElementById('step2Error');
  
  if (code.length !== 6) {
    errEl.textContent = 'Inserisci il codice completo';
    errEl.style.display = 'block';
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Verifica...';
  errEl.style.display = 'none';
  
  try {
    const res = await fetch(`${AUTH_API}?action=verify-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: adminEmail, code })
    });
    
    const data = await res.json();
    
    if (data.success && data.token) {
      localStorage.setItem(TOKEN_KEY, data.token);
      window.location.href = 'index.html';
      
    } else {
      errEl.textContent = data.error || 'Codice non valido';
      errEl.style.display = 'block';
      
      // Pulisci input
      for (let i = 1; i <= 6; i++) {
        document.getElementById(`otp${i}`).value = '';
      }
      document.getElementById('otp1').focus();
    }
    
  } catch(e) {
    errEl.textContent = 'Errore di connessione';
    errEl.style.display = 'block';
  }
  
  btn.disabled = false;
  btn.textContent = 'Verifica';
}

// ══════════════════════════════════════════
// OTP TIMER
// ══════════════════════════════════════════

function startOTPTimer(expiresAt) {
  const timerEl = document.getElementById('otpTimer');
  const resendBtn = document.getElementById('btnResendOTP');
  
  // Usa 5 minuti dal momento attuale
  const expiryTime = Date.now() + (5 * 60 * 1000);
  
  const interval = setInterval(() => {
    const now = Date.now();
    const remaining = Math.max(0, expiryTime - now);
    
    if (remaining === 0) {
      clearInterval(interval);
      timerEl.textContent = 'Scaduto';
      timerEl.style.color = '#ff3cac';
      resendBtn.style.display = 'inline-block';
      return;
    }
    
    const minutes = Math.floor(remaining / 60000);
    const seconds = Math.floor((remaining % 60000) / 1000);
    timerEl.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    
  }, 1000);
}

// ══════════════════════════════════════════
// RESEND OTP
// ══════════════════════════════════════════

async function resendOTP() {
  const password = document.getElementById('adminPassword').value;
  const btn = document.getElementById('btnResendOTP');
  
  btn.disabled = true;
  btn.textContent = 'Invio...';
  
  try {
    const res = await fetch(`${AUTH_API}?action=request-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: adminEmail, password })
    });
    
    const data = await res.json();
    
    if (data.success) {
      showToast('Nuovo codice inviato!', 'success');
      btn.style.display = 'none';
      startOTPTimer(data.expires_at);
      
      // Pulisci input
      for (let i = 1; i <= 6; i++) {
        document.getElementById(`otp${i}`).value = '';
      }
      document.getElementById('otp1').focus();
    }
    
  } catch(e) {
    showToast('Errore invio codice', 'error');
  }
  
  btn.disabled = false;
  btn.textContent = 'Rinvia codice';
}

// ══════════════════════════════════════════
// OTP INPUT AUTO-FOCUS
// ══════════════════════════════════════════

function setupOTPInputs() {
  for (let i = 1; i <= 6; i++) {
    const input = document.getElementById(`otp${i}`);
    if (!input) continue;
    
    input.addEventListener('input', (e) => {
      const value = e.target.value;
      
      // Solo numeri
      e.target.value = value.replace(/[^0-9]/g, '').slice(0, 1);
      
      // Auto-focus su prossimo input
      if (e.target.value && i < 6) {
        document.getElementById(`otp${i + 1}`).focus();
      }
    });
    
    input.addEventListener('keydown', (e) => {
      // Backspace: torna indietro
      if (e.key === 'Backspace' && !e.target.value && i > 1) {
        document.getElementById(`otp${i - 1}`).focus();
      }
      
      // Enter: submit
      if (e.key === 'Enter') {
        submitAdminStep2();
      }
    });
    
    // Paste: distribuisci codice
    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const paste = (e.clipboardData || window.clipboardData).getData('text');
      const digits = paste.replace(/[^0-9]/g, '').slice(0, 6);
      
      for (let j = 0; j < digits.length && j < 6; j++) {
        document.getElementById(`otp${j + 1}`).value = digits[j];
      }
      
      if (digits.length === 6) {
        document.getElementById('otp6').focus();
      }
    });
  }
}

// ══════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('adminFormStep1').classList.contains('visible')) {
    submitAdminStep1();
  }
});

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════

function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  if (!toast) return;
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════

loadWelcomeStats();
setupOTPInputs();

// Se c'è già un token valido, mostra il bottone "Continua come admin"
const existingToken = localStorage.getItem(TOKEN_KEY);
if (existingToken) {
  try {
    const payload = JSON.parse(atob(existingToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if (payload.exp > Math.floor(Date.now() / 1000)) {
      const choiceBtns = document.getElementById('choiceButtons');
      const continueBtn = document.createElement('button');
      continueBtn.className = 'btn-admin';
      continueBtn.style.cssText = 'background:none;border:1px solid rgba(232,255,0,0.4);color:var(--neon);box-shadow:none';
      continueBtn.innerHTML = '⚡ Continua come amministratore';
      continueBtn.onclick = () => { window.location.href = 'index.html'; };
      choiceBtns.insertBefore(continueBtn, choiceBtns.firstChild);
    }
  } catch(e) {}
}
</script>
</body>
</html>
