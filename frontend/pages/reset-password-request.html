<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📧 Recupera Password - Strike Zone</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .reset-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 420px;
      max-width: 95vw;
      box-shadow: 0 0 80px rgba(0,0,0,0.5);
    }

    .reset-icon {
      font-size: 3rem;
      text-align: center;
      display: block;
      margin-bottom: 1rem;
    }

    .reset-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.8rem;
      color: var(--neon);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .reset-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--neon);
      box-shadow: 0 0 12px rgba(232,255,0,0.3);
    }

    .btn-primary {
      width: 100%;
      background: var(--neon);
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }

    .btn-primary:hover {
      box-shadow: 0 0 40px rgba(232,255,0,0.5);
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg, .success-msg {
      padding: 0.8rem;
      border-radius: 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg {
      background: rgba(255,60,172,0.1);
      border: 1px solid var(--neon2);
      color: var(--neon2);
    }

    .success-msg {
      background: rgba(232,255,0,0.1);
      border: 1px solid var(--neon);
      color: var(--neon);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    .back-link:hover {
      color: var(--neon);
    }
  </style>
</head>
<body>

<div class="reset-card">
  <span class="reset-icon">📧</span>
  <div class="reset-title">RECUPERA PASSWORD</div>
  <div class="reset-subtitle">
    Inserisci la tua email e riceverai le istruzioni per reimpostare la password
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <form id="requestForm">
    <div class="form-group">
      <label class="form-label" for="email">Email Amministratore</label>
      <input 
        type="email" 
        id="email" 
        class="form-input" 
        placeholder="admin@strikezone.com"
        required
        autocomplete="email"
      />
    </div>

    <button type="submit" class="btn-primary" id="btnSubmit">
      Invia Link di Reset
    </button>
  </form>

  <a href="welcome.html" class="back-link">← Torna al login</a>
</div>

<script>
const AUTH_API = '/api/auth.php';

document.getElementById('requestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('btnSubmit');
  
  if (!email) {
    showError('Inserisci l\'email');
    return;
  }
  
  btn.disabled = true;
  btn.textContent = 'Invio...';
  hideMessages();
  
  try {
    const res = await fetch(`${AUTH_API}?action=request-reset`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    
    const data = await res.json();
    
    if (data.success) {
      showSuccess('Se l\'email esiste, riceverai le istruzioni a breve. Controlla la tua casella email.');
      document.getElementById('requestForm').style.display = 'none';
    } else {
      showError(data.error || 'Errore durante la richiesta');
      btn.disabled = false;
      btn.textContent = 'Invia Link di Reset';
    }
    
  } catch (err) {
    showError('Errore di connessione');
    btn.disabled = false;
    btn.textContent = 'Invia Link di Reset';
  }
});

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}

function hideMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}
</script>
</body>
</html>
